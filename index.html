<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sitedabrenda</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background-color: #000000;
        min-height: 100vh;
       display: flex;
       flex-direction: column;
    }

    header {

      background: #e76fff;

      color: white;

      padding: 20px;

      text-align: center;

    }

    nav {

      background: #820a8d;

      padding: 10px;

      text-align: center;

    }

    nav a {

      color: white;

      text-decoration: none;

      margin: 0 15px;

    }

    main {
        flex: 1;  
      padding: 40px;

      text-align: center;

    }

    .botao {

      display: inline-block;

      background: #e537fc;

      color: rgb(0, 0, 0);

      padding: 12px 20px;

      border-radius: 8px;

      text-decoration: none;

    }

    footer {

      background: #7e0083;

      color: white;

      text-align: center;

      padding: 15px;

      margin-top: 40px;

    }

  </style>

</head>

<body>

  <header>

    <h1>Primeirinho sitezinho da Brendinha</h1>

    <p>Feito com HTML e CSS</p>

  </header>

  <nav>

    <a href="#inicio">Início</a>

    <a href="#">Sobre</a>

    <a href="#">Contato</a>

  </nav>

  <main>
<section id="inicio">

        <h2>Bem-vindo!</h2>

    <p>Este é um site simples criado em HTML.</p>

    <a class="botao" href="#">Saiba mais</a>

</section>
 

  </main>

  <footer>

    © 2026 Sitezinho criado por Brendinha

  </footer>

</html>
