<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Meu Site</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background-color: #f4f4f4;

    }

    header {

      background: #0077cc;

      color: white;

      padding: 20px;

      text-align: center;

    }

    nav {

      background: #005fa3;

      padding: 10px;

      text-align: center;

    }

    nav a {

      color: white;

      text-decoration: none;

      margin: 0 15px;

    }

    main {

      padding: 40px;

      text-align: center;

    }

    .botao {

      display: inline-block;

      background: #0077cc;

      color: white;

      padding: 12px 20px;

      border-radius: 8px;

      text-decoration: none;

    }

    footer {

      background: #222;

      color: white;

      text-align: center;

      padding: 15px;

      margin-top: 40px;

    }

  </style>

</head>

<body>

  <header>

    <h1>Meu Primeiro Site</h1>

    <p>Feito com HTML e CSS</p>

  </header>

  <nav>

    <a href="#">Início</a>

    <a href="#">Sobre</a>

    <a href="#">Contato</a>

  </nav>

  <main>

    <h2>Bem-vindo!</h2>

    <p>Este é um site simples criado em HTML.</p>

    <a class="botao" href="#">Saiba mais</a>

  </main>

  <footer>

    © 2026 Meu Site

  </footer>

</body>

</html>
